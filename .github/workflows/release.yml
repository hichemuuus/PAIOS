name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install system deps
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Install Python deps
        run: |
          python -m pip install -r backend/requirements.txt
          python -m pip install pyinstaller

      - name: Install npm deps
        run: npm ci
        working-directory: frontend

      - name: Build backend sidecar
        run: python scripts/build_backend.py

      - name: Build Tauri app (NSIS installer)
        run: npm run tauri:build
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.UPDATER_PASSPHRASE }}

      - name: Generate update manifest
        working-directory: frontend
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          NSIS_DIR="src-tauri/target/release/bundle/nsis"

          INSTALLER=$(ls "$NSIS_DIR"/Veyron_*.exe 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "::error::No NSIS installer found in $NSIS_DIR"
            exit 1
          fi

          INSTALLER_NAME=$(basename "$INSTALLER")
          SIG_FILE="${INSTALLER}.sig"

          SIGNATURE=""
          if [ -f "$SIG_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
            echo "Signature loaded from $SIG_FILE"
          else
            echo "::warning::No .sig file found at $SIG_FILE — updater verification will fail"
          fi

          cat > "$NSIS_DIR/latest.json" << ENDJSON
          {
            "version": "$VERSION",
            "notes": "See $REPO/releases/tag/$TAG for release notes.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/$REPO/releases/download/$TAG/$INSTALLER_NAME"
              }
            }
          }
          ENDJSON

          echo "--- latest.json ---"
          cat "$NSIS_DIR/latest.json"
          echo "---"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Veyron ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            frontend/src-tauri/target/release/bundle/nsis/Veyron_*.exe
            frontend/src-tauri/target/release/bundle/nsis/Veyron_*.msi
            frontend/src-tauri/target/release/bundle/nsis/latest.json
            frontend/src-tauri/target/release/bundle/nsis/*.sig
